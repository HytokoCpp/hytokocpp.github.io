<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vision SLAM AR</title>
    <!-- Основные движки для "Angry Birds" трекинга -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <!-- Трекинг рук -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <style>
        body { margin: 0; overflow: hidden; }
        #ui-overlay {
            position: absolute; top: 20px; width: 100%; text-align: center;
            z-index: 1000; color: white; font-family: sans-serif; pointer-events: none;
        }
        .instruction { background: rgba(0,0,0,0.6); padding: 10px; border-radius: 20px; }
        #hand-canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 500; pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="ui-overlay">
        <div class="instruction" id="msg">НАВЕДИ НА ПОЛ И ТАПНИ</div>
    </div>

    <canvas id="hand-canvas"></canvas>

    <!-- Сцена AR -->
    <a-scene mindar-image="imageTargetSrc: ; autoStart: true; uiScanning: no;" 
             embedded color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" 
             vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: true">
        
        <a-camera position="0 0 0" look-controls="enabled: true"></a-camera>

        <!-- Этот объект появится там, где ты тапнешь -->
        <a-entity id="anchor">
            <a-grid id="floor-grid" static-body geometry="primitive: plane; width: 10; height: 10" 
                    rotation="-90 0 0" material="src: url(https://base-ar.github.io/assets/grid.png); transparent: true; opacity: 0.5" 
                    visible="false"></a-grid>
            
            <a-box id="center-cube" position="0 0.2 0" scale="0.4 0.4 0.4" 
                   material="color: #00ff00; wireframe: true" visible="false"></a-box>
        </a-entity>
    </a-scene>

    <script type="module">
        const anchor = document.querySelector('#anchor');
        const grid = document.querySelector('#floor-grid');
        const cube = document.querySelector('#center-cube');
        const msg = document.querySelector('#msg');
        const handCanvas = document.getElementById('hand-canvas');
        const ctx = handCanvas.getContext('2d');

        // ТАП ПО ЭКРАНУ СТАВИТ УРОВЕНЬ НА ПОЛ
        document.body.onclick = () => {
            // Фиксируем текущую позицию камеры как точку отсчета
            grid.setAttribute('visible', 'true');
            cube.setAttribute('visible', 'true');
            msg.innerText = "УРОВЕНЬ УСТАНОВЛЕН";
            setTimeout(() => { msg.style.display = 'none'; }, 2000);
        };

        // ТРЕКИНГ РУК (Медиапайп)
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 1,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        hands.onResults((results) => {
            handCanvas.width = window.innerWidth;
            handCanvas.height = window.innerHeight;
            ctx.clearRect(0, 0, handCanvas.width, handCanvas.height);
            
            if (results.multiHandLandmarks) {
                for (const landmarks of results.multiHandLandmarks) {
                    drawConnectors(ctx, landmarks, HAND_CONNECTIONS, {color: '#00FF00', lineWidth: 4});
                    drawLandmarks(ctx, landmarks, {color: '#FFFFFF', lineWidth: 1, radius: 3});
                }
            }
        });

        // Запуск камеры для рук (берем поток из сцены A-Frame)
        setTimeout(() => {
            const video = document.querySelector('video');
            if (video) {
                const camera = new Camera(video, {
                    onFrame: async () => { await hands.send({image: video}); }
                });
                camera.start();
            }
        }, 3000);

    </script>
</body>
</html>
