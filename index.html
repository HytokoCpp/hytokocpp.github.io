<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
	<title>Vision v2</title>
	<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
	<style>
		body { margin: 0; background: #000; overflow: hidden; position: fixed; width: 100vw; height: 100vh; }
		#input_video { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
		canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
		#canvas_3d { z-index: 2; }
		#canvas_2d { z-index: 3; }
		#ui { position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); z-index: 100; text-align: center; width: 100%; }
		.btn { background: #00ff00; color: #000; border: none; padding: 20px 40px; border-radius: 50px; font-weight: bold; font-size: 18px; box-shadow: 0 0 20px rgba(0,255,0,0.5); }
	</style>
</head>
<body>

	<video id="input_video" playsinline autoplay muted></video>
	<canvas id="canvas_3d"></canvas>
	<canvas id="canvas_2d"></canvas>

	<div id="ui">
		<button class="btn" id="startBtn">START SYSTEM</button>
	</div>

	<script type="module">
		const video = document.getElementById('input_video');
		const canvas2d = document.getElementById('canvas_2d');
		const canvas3d = document.getElementById('canvas_3d');
		const startBtn = document.getElementById('startBtn');
		const ctx2d = canvas2d.getContext('2d');

		let scene, camera, renderer, panel;
		let isRunning = false;
		const targetPosition = new THREE.Vector3();

		function init3D() {
			scene = new THREE.Scene();
			camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
			renderer = new THREE.WebGLRenderer({ canvas: canvas3d, alpha: true, antialias: true });
			renderer.setSize(window.innerWidth, window.innerHeight);
			renderer.setPixelRatio(window.devicePixelRatio);

			const geometry = new THREE.BoxGeometry(0.8, 0.5, 0.01);
			const material = new THREE.MeshNormalMaterial({ wireframe: true });
			panel = new THREE.Mesh(geometry, material);
			panel.position.set(0, 0, -1.5);
			scene.add(panel);
		}

		async function startSensors() {
			if (typeof DeviceOrientationEvent.requestPermission === 'function') {
				const res = await DeviceOrientationEvent.requestPermission();
				if (res !== 'granted') return;
			}
			window.addEventListener('deviceorientation', (e) => {
				const a = e.alpha ? THREE.MathUtils.degToRad(e.alpha) : 0;
				const b = e.beta ? THREE.MathUtils.degToRad(e.beta) : 0;
				const g = e.gamma ? THREE.MathUtils.degToRad(e.gamma) : 0;
				camera.rotation.set(b, g, a, 'YXZ');
			});
		}

		startBtn.onclick = async () => {
			await startSensors();
			isRunning = true;
			startBtn.style.display = "none";
		};

		const hands = new Hands({
			locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
		});

		hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
		hands.onResults((results) => {
			canvas2d.width = window.innerWidth;
			canvas2d.height = window.innerHeight;
			ctx2d.clearRect(0, 0, canvas2d.width, canvas2d.height);
			if (results.multiHandLandmarks) {
				for (const landmarks of results.multiHandLandmarks) {
					drawConnectors(ctx2d, landmarks, HAND_CONNECTIONS, {color: '#00ff00', lineWidth: 4});
					drawLandmarks(ctx2d, landmarks, {color: '#ffffff', lineWidth: 1, radius: 2});
				}
			}
			renderer.render(scene, camera);
		});

		const camHelper = new Camera(video, {
			onFrame: async () => { await hands.send({image: video}); },
			width: 1280, 
			height: 720,
			facingMode: "environment"
		});

		init3D();
		camHelper.start();

		function animate() {
			requestAnimationFrame(animate);
			
			if (panel && isRunning) {
				targetPosition.set(0, 0, -1.5).applyQuaternion(camera.quaternion).add(camera.position);
				panel.position.lerp(targetPosition, 0.05);
				panel.quaternion.slerp(camera.quaternion, 0.05);
			}

			renderer.render(scene, camera);
		}
		animate();

		window.addEventListener('resize', () => {
			camera.aspect = window.innerWidth / window.innerHeight;
			camera.updateProjectionMatrix();
			renderer.setSize(window.innerWidth, window.innerHeight);
		});
	</script>
</body>
</html>
