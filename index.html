<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
	<title>Vision AR</title>
	<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
	<style>
		body { margin: 0; background: #000; overflow: hidden; position: fixed; width: 100%; height: 100%; }
		#input_video { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
		#canvas_overlay { position: absolute; top: 0; left: 0; z-index: 2; width: 100%; height: 100%; pointer-events: none; }
		#ui { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 100; }
		.btn { background: #00ff00; color: black; border: none; padding: 15px 35px; border-radius: 40px; font-family: monospace; font-weight: bold; }
	</style>
</head>
<body>

	<video id="input_video" playsinline autoplay muted></video>
	<canvas id="canvas_overlay"></canvas>

	<div id="ui">
		<button class="btn" id="lockBtn">SET CENTER</button>
	</div>

	<script type="module">
		const videoElement = document.getElementById('input_video');
		const canvasElement = document.getElementById('canvas_overlay');
		const lockBtn = document.getElementById('lockBtn');
		const ctx = canvasElement.getContext('2d');

		let scene, camera, renderer, cube, grid, isLocked = false;

		function init3D() {
			scene = new THREE.Scene();
			camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
			renderer = new THREE.WebGLRenderer({ canvas: canvasElement, antialias: true, alpha: true });
			renderer.setSize(window.innerWidth, window.innerHeight);
			renderer.setPixelRatio(window.devicePixelRatio);

			const mat = new THREE.MeshBasicMaterial({ color: 0x00ff00, wireframe: true });
			cube = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.3, 0.3), mat);
			cube.position.set(0, 0, -1.5);
			scene.add(cube);

			grid = new THREE.GridHelper(20, 40, 0xff0000, 0x333333);
			grid.position.y = -1;
			scene.add(grid);
			scene.add(new THREE.AmbientLight(0xffffff, 1));
		}

		async function requestPermissions() {
			if (typeof DeviceOrientationEvent.requestPermission === 'function') {
				const p = await DeviceOrientationEvent.requestPermission();
				if (p === 'granted') window.addEventListener('deviceorientation', handleOrientation);
			} else {
				window.addEventListener('deviceorientation', handleOrientation);
			}
		}

		function handleOrientation(e) {
			if (!isLocked) return;
			const a = e.alpha ? THREE.MathUtils.degToRad(e.alpha) : 0;
			const b = e.beta ? THREE.MathUtils.degToRad(e.beta) : 0;
			const g = e.gamma ? THREE.MathUtils.degToRad(e.gamma) : 0;
			camera.rotation.set(b, g, a);
		}

		lockBtn.onclick = async () => {
			await requestPermissions();
			isLocked = true;
			grid.children[0].material.color.setHex(0x00ff00);
			lockBtn.style.display = "none";
		};

		function onResults(results) {
			ctx.clearRect(0, 0, canvasElement.width, canvasElement.height);
			if (results.multiHandLandmarks) {
				for (const landmarks of results.multiHandLandmarks) {
					drawConnectors(ctx, landmarks, HAND_CONNECTIONS, {color: '#00ff00', lineWidth: 4});
					drawLandmarks(ctx, landmarks, {color: '#ffffff', lineWidth: 1, radius: 2});
				}
			}
			renderer.render(scene, camera);
		}

		const hands = new Hands({
			locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
		});

		hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
		hands.onResults(onResults);

		const cam = new Camera(videoElement, {
			onFrame: async () => { await hands.send({image: videoElement}); },
			width: 1280, height: 720, facingMode: "environment"
		});

		init3D();
		cam.start();

		function animate() {
			requestAnimationFrame(animate);
			if (cube) cube.rotation.y += 0.02;
			renderer.render(scene, camera);
		}
		animate();

		window.addEventListener('resize', () => {
			camera.aspect = window.innerWidth / window.innerHeight;
			camera.updateProjectionMatrix();
			renderer.setSize(window.innerWidth, window.innerHeight);
		});
	</script>
</body>
</html>
