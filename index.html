<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
	<title>Vision Pro</title>
	<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
	<style>
		body { margin: 0; background: #000; overflow: hidden; position: fixed; width: 100vw; height: 100vh; }
		#input_video { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
		#canvas_3d { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }
		#canvas_2d { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 3; pointer-events: none; }
		#ui { position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); z-index: 100; text-align: center; }
		#status { position: absolute; top: 30px; width: 100%; text-align: center; color: #fff; z-index: 101; font-family: monospace; font-size: 20px; text-shadow: 0 0 10px #000; }
		.btn { background: #00ff00; color: #000; border: none; padding: 20px 40px; border-radius: 50px; font-weight: bold; font-size: 18px; }
	</style>
</head>
<body>

	<div id="status">INIT CAMERA...</div>
	<video id="input_video" playsinline autoplay muted></video>
	<canvas id="canvas_3d"></canvas>
	<canvas id="canvas_2d"></canvas>

	<div id="ui">
		<button class="btn" id="lockBtn">SET WORLD CENTER</button>
	</div>

	<script type="module">
		const video = document.getElementById('input_video');
		const canvas2d = document.getElementById('canvas_2d');
		const canvas3d = document.getElementById('canvas_3d');
		const lockBtn = document.getElementById('lockBtn');
		const status = document.getElementById('status');
		const ctx2d = canvas2d.getContext('2d');

		let scene, camera, renderer, world, grid, cube;
		let isLocked = false;

		function init3D() {
			scene = new THREE.Scene();
			camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
			renderer = new THREE.WebGLRenderer({ canvas: canvas3d, alpha: true, antialias: true });
			renderer.setSize(window.innerWidth, window.innerHeight);
			renderer.setPixelRatio(window.devicePixelRatio);

			world = new THREE.Group();
			scene.add(world);

			grid = new THREE.GridHelper(20, 40, 0x00ff00, 0x222222);
			grid.position.y = -1.5;
			world.add(grid);

			cube = new THREE.Mesh(
				new THREE.BoxGeometry(0.4, 0.4, 0.4),
				new THREE.MeshNormalMaterial({ wireframe: true })
			);
			cube.position.set(0, -1.3, -3);
			world.add(cube);

			world.visible = false;
		}

		async function startCamera() {
			const constraints = {
				video: { facingMode: { exact: "environment" }, width: 1280, height: 720 }
			};
			try {
				const stream = await navigator.mediaDevices.getUserMedia(constraints);
				video.srcObject = stream;
				status.innerText = "POINT TO FLOOR & LOCK";
			} catch (e) {
				const fallback = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
				video.srcObject = fallback;
			}
		}

		async function startSensors() {
			if (typeof DeviceOrientationEvent.requestPermission === 'function') {
				const res = await DeviceOrientationEvent.requestPermission();
				if (res !== 'granted') return;
			}
			window.addEventListener('deviceorientation', (e) => {
				const a = e.alpha ? THREE.MathUtils.degToRad(e.alpha) : 0;
				const b = e.beta ? THREE.MathUtils.degToRad(e.beta) : 0;
				const g = e.gamma ? THREE.MathUtils.degToRad(e.gamma) : 0;
				camera.rotation.set(b, g, a, 'YXZ');
			});
		}

		lockBtn.onclick = async () => {
			await startSensors();
			isLocked = true;
			world.visible = true;
			lockBtn.style.display = "none";
			status.innerText = "VISION READY";
		};

		const hands = new Hands({
			locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
		});

		hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
		hands.onResults((results) => {
			canvas2d.width = window.innerWidth;
			canvas2d.height = window.innerHeight;
			ctx2d.clearRect(0, 0, canvas2d.width, canvas2d.height);
			if (results.multiHandLandmarks) {
				for (const landmarks of results.multiHandLandmarks) {
					drawConnectors(ctx2d, landmarks, HAND_CONNECTIONS, {color: '#00ff00', lineWidth: 4});
					drawLandmarks(ctx2d, landmarks, {color: '#ffffff', lineWidth: 1, radius: 2});
				}
			}
			renderer.render(scene, camera);
		});

		const camHelper = new Camera(video, {
			onFrame: async () => { await hands.send({image: video}); },
			width: 1280, height: 720
		});

		init3D();
		startCamera().then(() => camHelper.start());

		function animate() {
			requestAnimationFrame(animate);
			if (cube) cube.rotation.y += 0.02;
			renderer.render(scene, camera);
		}
		animate();

		window.addEventListener('resize', () => {
			camera.aspect = window.innerWidth / window.innerHeight;
			camera.updateProjectionMatrix();
			renderer.setSize(window.innerWidth, window.innerHeight);
		});
	</script>
</body>
</html>
