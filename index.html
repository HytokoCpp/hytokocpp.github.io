<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
	<title>Vision Pro WebAR</title>
	<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
	<style>
		body { margin: 0; background: #000; overflow: hidden; position: fixed; width: 100vw; height: 100vh; }
		#input_video { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 1; display: none; }
		canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
		#canvas_3d { z-index: 2; }
		#canvas_2d { z-index: 3; }
		#ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; z-index: 100; background: #000; }
		.btn { background: #00ff00; color: #000; border: none; padding: 25px 50px; border-radius: 50px; font-weight: bold; font-size: 20px; cursor: pointer; }
	</style>
</head>
<body>

	<video id="input_video" playsinline autoplay muted></video>
	<canvas id="canvas_3d"></canvas>
	<canvas id="canvas_2d"></canvas>

	<div id="ui">
		<button class="btn" id="startBtn">START VISION</button>
	</div>

	<script type="module">
		const video = document.getElementById('input_video');
		const canvas2d = document.getElementById('canvas_2d');
		const canvas3d = document.getElementById('canvas_3d');
		const startBtn = document.getElementById('startBtn');
		const ui = document.getElementById('ui');
		const ctx2d = canvas2d.getContext('2d');

		let scene, camera, renderer, panel;
		let isRunning = false;
		let appState = "FOLLOW";
		let handNDC = new THREE.Vector2();
		let isPinching = false;
		let camHelper;
		let handSize = 0.15;

		let smoothedAlpha = 0, smoothedBeta = 0, smoothedGamma = 0;
		const filterFactor = 0.05;

		const targetPosition = new THREE.Vector3();
		const raycaster = new THREE.Raycaster();

		function init3D() {
			scene = new THREE.Scene();
			camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
			camera.rotation.reorder('YXZ');
			
			renderer = new THREE.WebGLRenderer({ canvas: canvas3d, alpha: true, antialias: true });
			renderer.setSize(window.innerWidth, window.innerHeight);
			renderer.setPixelRatio(window.devicePixelRatio);

			const geometry = new THREE.BoxGeometry(0.8, 0.5, 0.02);
			const material = new THREE.MeshBasicMaterial({ 
				color: 0xffffff, 
				transparent: true, 
				opacity: 0.9,
				side: THREE.DoubleSide
			});
			panel = new THREE.Mesh(geometry, material);
			panel.position.set(0, 0, -1.5);
			scene.add(panel);
		}

		async function startSensors() {
			if (typeof DeviceOrientationEvent.requestPermission === 'function') {
				const res = await DeviceOrientationEvent.requestPermission();
				if (res === 'granted') {
					window.addEventListener('deviceorientation', handleOrientation);
				}
			} else {
				window.addEventListener('deviceorientation', handleOrientation);
			}
		}

		function handleOrientation(e) {
			const a = e.alpha ? THREE.MathUtils.degToRad(e.alpha) : 0;
			const b = e.beta ? THREE.MathUtils.degToRad(e.beta) : 0;
			const g = e.gamma ? THREE.MathUtils.degToRad(e.gamma) : 0;

			smoothedAlpha += (a - smoothedAlpha) * filterFactor;
			smoothedBeta += (b - smoothedBeta) * filterFactor;
			smoothedGamma += (g - smoothedGamma) * filterFactor;

			camera.rotation.set(smoothedBeta, smoothedGamma, smoothedAlpha, 'YXZ');
		}

		startBtn.onclick = async () => {
			ui.style.display = "none";
			video.style.display = "block";
			
			await startSensors();
			init3D();
			
			camHelper = new Camera(video, {
				onFrame: async () => { await hands.send({image: video}); },
				width: 1280, 
				height: 720,
				facingMode: "environment"
			});
			
			camHelper.start();
			isRunning = true;
			animate();
		};

		const hands = new Hands({
			locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
		});

		hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
		hands.onResults((results) => {
			canvas2d.width = window.innerWidth;
			canvas2d.height = window.innerHeight;
			ctx2d.clearRect(0, 0, canvas2d.width, canvas2d.height);
			
			isPinching = false;

			if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
				const landmarks = results.multiHandLandmarks[0];
				
				drawConnectors(ctx2d, landmarks, HAND_CONNECTIONS, {color: '#00ff00', lineWidth: 4});
				drawLandmarks(ctx2d, landmarks, {color: '#ffffff', lineWidth: 1, radius: 2});

				const thumb = landmarks[4];
				const index = landmarks[8];
				const wrist = landmarks[0];
				const middleMCP = landmarks[9];

				const dist3D = Math.sqrt(
					Math.pow(thumb.x - index.x, 2) + 
					Math.pow(thumb.y - index.y, 2) + 
					Math.pow(thumb.z - index.z, 2)
				);

				handSize = Math.sqrt(
					Math.pow(wrist.x - middleMCP.x, 2) + 
					Math.pow(wrist.y - middleMCP.y, 2) + 
					Math.pow(wrist.z - middleMCP.z, 2)
				);

				const handX = (thumb.x + index.x) / 2;
				const handY = (thumb.y + index.y) / 2;
				
				handNDC.set((handX * 2) - 1, -(handY * 2) + 1);

				if (dist3D < 0.13) {
					isPinching = true;
				}
			}
		});

		function animate() {
			requestAnimationFrame(animate);
			
			if (panel && isRunning) {
				const panelScreenPos = panel.position.clone().project(camera);
				const isNearLeftEdge = (panelScreenPos.x - handNDC.x) > 0.15 && (panelScreenPos.x - handNDC.x) < 0.55 && Math.abs(handNDC.y - panelScreenPos.y) < 0.45;

				if (isPinching) {
					if (appState === "FOLLOW" && isNearLeftEdge) {
						appState = "DRAG";
					} else if (appState === "STATIONARY" && isNearLeftEdge) {
						appState = "DRAG";
					}
				} else {
					if (appState === "DRAG") {
						appState = "STATIONARY";
					}
				}

				const minSize = 0.08;
				const maxSize = 0.28;
				const t = THREE.MathUtils.clamp((handSize - minSize) / (maxSize - minSize), 0, 1);
				const currentDragDistance = THREE.MathUtils.lerp(3.0, 0.8, t);

				const distanceToCam = panel.position.distanceTo(camera.position);
				const dynamicScale = distanceToCam * 0.65;
				panel.scale.set(dynamicScale, dynamicScale, 1);

				if (appState === "FOLLOW") {
					targetPosition.set(0, 0, -1.5).applyQuaternion(camera.quaternion).add(camera.position);
					panel.position.lerp(targetPosition, 0.05);
					panel.quaternion.slerp(camera.quaternion, 0.05);
				} else if (appState === "DRAG") {
					raycaster.setFromCamera(handNDC, camera);
					const dir = raycaster.ray.direction;
					const dragTarget = camera.position.clone().add(dir.multiplyScalar(currentDragDistance));
					
					panel.position.copy(dragTarget);
					panel.quaternion.copy(camera.quaternion);
				}
			}

			if (renderer && scene && camera) {
				renderer.render(scene, camera);
			}
		}

		window.addEventListener('resize', () => {
			if (camera && renderer) {
				camera.aspect = window.innerWidth / window.innerHeight;
				camera.updateProjectionMatrix();
				renderer.setSize(window.innerWidth, window.innerHeight);
				canvas2d.width = window.innerWidth;
				canvas2d.height = window.innerHeight;
			}
		});
	</script>
</body>
</html>
